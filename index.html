<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Mitra Calculator</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:15px;
}

.container{
max-width:500px;
margin:auto;
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.15);
}

h1{
text-align:center;
font-size:38px;
margin-bottom:10px;
}

h2{
text-align:center;
font-size:24px;
margin-bottom:20px;
}

input,select{
width:100%;
padding:12px;
margin:8px 0;
font-size:16px;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:14px;
font-size:18px;
font-weight:bold;
background:#25D366;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

.result{
margin-top:20px;
padding:15px;
background:#f7f7f7;
border-radius:8px;
}

.row{
display:flex;
justify-content:space-between;
margin:10px 0;
font-size:18px;
font-weight:bold;
}

#sendBtn{
display:none;
text-decoration:none;
text-align:center;
margin-top:15px;
}

@media(max-width:480px){
h1{font-size:30px;}
h2{font-size:20px;}
.row{font-size:16px;}
}
</style>

</head>

<body>

<div class="container">

<h1>Loan Mitra</h1>
<h2>Project Report Calculator</h2>

<input type="text" id="name" placeholder="Enter Name">
<input type="text" id="state" placeholder="Enter State">
<input type="text" id="district" placeholder="Enter District">
<input type="number" id="loan" placeholder="Enter Desired Loan Amount">

<button onclick="calculate()">Calculate</button>

<div class="result">

<div class="row">
<span>Project Report Fee</span>
<span id="fee">0</span>
</div>

<div class="row">
<span>GST (18%)</span>
<span id="gst">0</span>
</div>

<div class="row">
<span>Total</span>
<span id="total">0</span>
</div>

</div>

<a id="sendBtn">
<button>Send on WhatsApp</button>
</a>

</div>

<script>

function calculate(){

let name=document.getElementById("name").value;
let state=document.getElementById("state").value;
let district=document.getElementById("district").value;
let loan=parseFloat(document.getElementById("loan").value);

if(!name || !state || !district || !loan){
alert("Please fill all details");
return;
}

/* ✅ NEW SLAB SYSTEM */
let fee;

if (loan <= 500000) {
    fee = 3000 + ((loan / 500000) * 2000);
}
else if (loan <= 1000000) {
    fee = 5000 + ((loan - 500000) / 500000) * 5000;
}
else if (loan <= 2500000) {
    fee = 10000 + ((loan - 1000000) / 1500000) * 5000;
}
else if (loan <= 5000000) {
    fee = 15000 + ((loan - 2500000) / 2500000) * 10000;
}
else if (loan <= 10000000) {
    fee = 25000 + ((loan - 5000000) / 5000000) * 15000;
}
else {
    fee = 40000 + ((loan - 10000000) / 40000000) * 60000;
}

fee = Math.round(fee);

let gst = Math.round(fee * 0.18);
let total = fee + gst;

document.getElementById("fee").innerHTML="₹"+fee.toLocaleString('en-IN');
document.getElementById("gst").innerHTML="₹"+gst.toLocaleString('en-IN');
document.getElementById("total").innerHTML="₹"+total.toLocaleString('en-IN');

let msg =
"*Loan Mitra New Inquiry*%0A%0A"+
"Name: "+name+"%0A"+
"State: "+state+"%0A"+
"District: "+district+"%0A"+
"Loan Amount: ₹"+loan.toLocaleString('en-IN')+"%0A"+
"Project Report Fee: ₹"+fee.toLocaleString('en-IN')+"%0A"+
"GST: ₹"+gst.toLocaleString('en-IN')+"%0A"+
"Total: ₹"+total.toLocaleString('en-IN');

let whatsappLink =
"https://wa.me/918051656696?text="+msg;

let sendBtn=document.getElementById("sendBtn");
sendBtn.href=whatsappLink;
sendBtn.style.display="block";
}

</script>

</body>
</html>
